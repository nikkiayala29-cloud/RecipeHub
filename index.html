<!DOCTYPE html>
<html>
<head>
  <title>RecipeHub Defense</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <h1>🍽 RecipeHub</h1>
  <div>
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('recipes')">Recipes</button>
    <button onclick="showPage('favorites')">Favorites</button>
    <button onclick="showPage('planner')">Meal Plan</button>
  </div>
</nav>

<!-- HOME -->
<section id="home" class="active">
  <h2>Welcome to RecipeHub</h2>
  <p>Manage recipes, favorites, and meal plans easily.</p>
</section>

<!-- RECIPES -->
<section id="recipes">
  <input oninput="searchRecipes(this.value)" placeholder="Search recipes...">
  <div id="recipeList" class="grid"></div>
</section>

<!-- FAVORITES -->
<section id="favorites">
  <h2>Your Favorites</h2>
  <div id="favoriteList" class="grid"></div>
</section>

<!-- MEAL PLANNER -->
<section id="planner">
  <h2>Meal Planner</h2>
  <div id="plannerList"></div>
</section>

<script src="recipes.js"></script>
<script src="app.js"></script>

</body>
</html>
